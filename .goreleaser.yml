version: 2

project_name: claude-sessions

before:
  hooks:
    - go mod tidy

builds:
  - id: claude-sessions
    main: ./
    binary: claude-sessions
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: arman81
    name: claude-sessions
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## claude-sessions {{ .Tag }}

    Lightweight local dashboard for tracking Claude Code sessions across all terminals.

    ### Install

    ```bash
    brew install arman81/tap/claude-sessions
    # or
    go install github.com/arman81/claude-sessions@latest
    ```
  footer: |
    **Full Changelog**: https://github.com/arman81/claude-sessions/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: claude-sessions
    repository:
      owner: arman81
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/arman81/claude-sessions"
    description: "Lightweight local dashboard for tracking Claude Code sessions across all terminals"
    license: "MIT"
    install: |
      bin.install "claude-sessions"
    test: |
      assert_predicate bin/"claude-sessions", :exist?
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
