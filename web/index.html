<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>claude-sessions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-head">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">claude-sessions</span>
      </div>
      <button id="collapse-btn" class="icon-btn" title="Collapse sidebar" aria-label="collapse">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span class="state-layer"></span>
      </button>
    </div>

    <div class="sidebar-search">
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search" type="search" placeholder="Search sessions" />
      </div>
    </div>

    <div class="sidebar-status">
      <span id="status-text">connecting</span>
      <label class="switch">
        <input type="checkbox" id="show-exited" />
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span class="switch-label">Show exited</span>
      </label>
    </div>

    <div id="groups" class="groups"></div>
  </aside>

  <main id="main" class="main">
    <div id="empty-main" class="empty-main">
      <div class="empty-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25">
          <rect x="3" y="4" width="18" height="14" rx="3"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <circle cx="7" cy="7" r="0.6" fill="currentColor"/>
          <circle cx="9" cy="7" r="0.6" fill="currentColor"/>
        </svg>
      </div>
      <h2>Select a session</h2>
      <p>Pick one from the sidebar to see its summary, transcript, and metadata.</p>
    </div>
    <div id="detail" class="detail"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
